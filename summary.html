<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>สรุปยอดบัตร</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cover:#050806; --cover-dark:#020302;
    --paper:#081109; --paper-line:#173322;
    --ink-red:#FF4D3D; --ink-green:#33FF66; --ink-blue:#2FE0A8; --ink-purple:#C9E63A;
    --gold:#C9E63A;
    --panel:#0C1912; --panel-alt:#12241A;
    --text-muted:#5E8A6C; --text-dark:#CFEFD9;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--cover); min-height:100%;}
  body{
    font-family:'IBM Plex Sans Thai', sans-serif; color:var(--text-dark);
    background:linear-gradient(180deg, var(--cover) 0%, var(--cover-dark) 100%);
    display:flex; justify-content:center;
    position:relative;
  }
  @media (prefers-reduced-motion: no-preference){
    body::before{
      content:''; position:fixed; inset:0; pointer-events:none; z-index:50;
      background:linear-gradient(180deg, transparent, rgba(51,255,102,0.05), transparent);
      background-size:100% 5px; animation:scan 7s linear infinite; mix-blend-mode:screen;
    }
  }
  @keyframes scan{ 0%{transform:translateY(-100%);} 100%{transform:translateY(100%);} }
  .app{ width:100%; max-width:480px; min-height:100vh; display:flex; flex-direction:column; }

  .cover{ padding:22px 20px 16px; position:relative; }
  .cover::after{ content:''; position:absolute; left:20px; right:20px; bottom:0; height:1px;
    background:linear-gradient(90deg, transparent, var(--ink-green), transparent);
    box-shadow:0 0 8px rgba(51,255,102,.45); }
  .cover h1{ font-family:'Chakra Petch', sans-serif; font-weight:700; color:var(--ink-green); font-size:22px; margin:0 0 2px;
    letter-spacing:.04em; text-transform:uppercase; text-shadow:0 0 10px rgba(51,255,102,.55), 0 0 2px rgba(51,255,102,.8); }
  .cover p{ color:var(--text-muted); font-size:12.5px; margin:0; font-family:'IBM Plex Mono', monospace; }

  .tabs{ display:flex; gap:8px; padding:14px 20px 0; }
  .tab{ flex:1; text-align:center; padding:10px 0; border-radius:6px 6px 0 0; font-weight:600; font-size:14px;
    color:var(--text-muted); background:var(--panel); border:1px solid var(--paper-line); border-bottom:none;
    font-family:'IBM Plex Sans Thai', sans-serif; cursor:pointer; }
  .tab[data-active="true"]{ background:var(--paper); color:var(--ink-green); text-shadow:0 0 6px rgba(51,255,102,.5); }

  .ledger{ background:var(--paper); flex:1; padding:20px 20px 40px; border-top:1px solid var(--paper-line); }
  .view{ display:none; }
  .view[data-active="true"]{ display:block; }

  /* ---- การ์ดสรุปบัตร ---- */
  .card{ background:var(--panel); border:1px solid var(--paper-line); border-radius:10px; padding:16px; margin-bottom:14px; }
  .card-head{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px; }
  .card-name{ font-weight:700; font-size:16px; font-family:'Chakra Petch', sans-serif; color:var(--text-dark); }
  .card-sub{ font-size:11.5px; color:var(--text-muted); font-family:'IBM Plex Mono', monospace; }
  .util-bar-track{ height:8px; border-radius:4px; background:var(--panel-alt); overflow:hidden; margin-bottom:6px; border:1px solid var(--paper-line); }
  .util-bar-fill{ height:100%; border-radius:3px; }
  .util-label{ display:flex; justify-content:space-between; font-size:11.5px; color:var(--text-muted); margin-bottom:14px; font-family:'IBM Plex Mono', monospace; }
  .stat-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .stat{ background:var(--panel-alt); border:1px solid var(--paper-line); border-radius:6px; padding:8px 10px; }
  .stat-label{ font-size:10.5px; color:var(--text-muted); margin-bottom:3px; font-family:'IBM Plex Mono', monospace; text-transform:uppercase; }
  .stat-value{ font-family:'IBM Plex Mono', monospace; font-weight:700; font-size:15px; color:var(--ink-green); }
  .stat-value.due{ color:var(--ink-red); text-shadow:0 0 8px rgba(255,77,61,.35); }
  .due-date-tag{ font-size:10.5px; color:var(--text-muted); margin-top:2px; font-family:'IBM Plex Mono', monospace; }

  .empty-note{ text-align:center; color:var(--text-muted); font-size:13.5px; padding:30px 10px; font-family:'IBM Plex Mono', monospace; }

  /* ---- จัดการบัญชี ---- */
  .acc-list-item{ display:flex; justify-content:space-between; align-items:center; background:var(--panel);
    border:1px solid var(--paper-line); border-radius:8px; padding:12px 14px; margin-bottom:8px; cursor:pointer; }
  .acc-list-item[data-inactive="true"]{ opacity:.4; }
  .acc-name{ font-weight:600; font-size:14px; color:var(--text-dark); }
  .acc-sub{ font-size:11.5px; color:var(--text-muted); font-family:'IBM Plex Mono', monospace; }
  .acc-edit{ color:var(--ink-green); font-size:18px; }

  .add-btn{ width:100%; padding:13px 0; border-radius:8px; border:1.5px dashed var(--paper-line);
    background:transparent; color:var(--ink-green); font-family:'Chakra Petch', sans-serif; font-size:14px; font-weight:600;
    cursor:pointer; margin-bottom:14px; letter-spacing:.03em; }

  /* ---- ฟอร์มแบบ modal เลื่อนขึ้นจากล่าง ---- */
  .sheet-overlay{ position:fixed; inset:0; background:rgba(2,5,3,0.75); display:none; z-index:20; }
  .sheet-overlay[data-open="true"]{ display:block; }
  .sheet{ position:fixed; left:0; right:0; bottom:0; max-width:480px; margin:0 auto; background:var(--paper);
    border-top:1px solid var(--ink-green); border-radius:14px 14px 0 0; padding:20px 20px calc(20px + env(safe-area-inset-bottom));
    max-height:88vh; overflow-y:auto; }
  .sheet-title{ font-family:'Chakra Petch', sans-serif; font-weight:700; font-size:17px; margin:0 0 14px; color:var(--ink-green);
    text-transform:uppercase; letter-spacing:.03em; }
  .form-field{ margin-bottom:12px; }
  .form-label{ font-size:12px; color:var(--text-muted); font-weight:600; margin-bottom:6px; font-family:'IBM Plex Mono', monospace; text-transform:uppercase; letter-spacing:.05em; }
  .form-input, .form-select{ width:100%; padding:10px 12px; border-radius:6px; border:1px solid var(--paper-line);
    font-family:inherit; font-size:14px; background:var(--panel); color:var(--text-dark); }
  .form-input:focus, .form-select:focus{ outline:none; border-color:var(--ink-green); box-shadow:0 0 0 1px var(--ink-green); }
  .form-row2{ display:flex; gap:10px; }
  .form-row2 > div{ flex:1; }
  .toggle-row{ display:flex; align-items:center; justify-content:space-between; padding:6px 0; }
  .form-actions{ display:flex; gap:10px; margin-top:16px; }
  .btn{ flex:1; padding:13px 0; border-radius:8px; border:1px solid; font-family:'Chakra Petch', sans-serif; font-weight:600;
    font-size:14.5px; cursor:pointer; text-transform:uppercase; letter-spacing:.03em; background:transparent; }
  .btn.primary{ background:var(--ink-green); color:var(--cover-dark); border-color:var(--ink-green); }
  .btn.ghost{ background:transparent; color:var(--text-muted); border-color:var(--paper-line); }
  .status{ text-align:center; font-size:13px; color:var(--text-muted); min-height:18px; margin-top:8px; font-family:'IBM Plex Mono', monospace; }
  .status.ok{ color:var(--ink-green); font-weight:600; }
  .status.err{ color:var(--ink-red); font-weight:600; }

  .toast{ position:fixed; top:16px; left:50%; transform:translateX(-50%); background:var(--panel); color:var(--ink-green);
    padding:10px 18px; border-radius:6px; border:1px solid var(--ink-green); font-size:13.5px; opacity:0; transition:opacity .25s; pointer-events:none;
    max-width:90%; text-align:center; font-family:'IBM Plex Mono', monospace; z-index:30; }
  .toast.show{ opacity:1; }
</style>
</head>
<body>
<div class="app">

  <div class="cover">
    <h1>สรุปยอดบัตร</h1>
    <p id="profileLine">กำลังเชื่อมต่อ…</p>
  </div>

  <div class="tabs" id="tabs">
    <button class="tab" data-tab="summary" data-active="true">สรุปยอดบัตร</button>
    <button class="tab" data-tab="accounts">จัดการบัญชี</button>
  </div>

  <div class="ledger">

    <div class="view" data-tab="summary" data-active="true">
      <div id="cardsContainer"></div>
    </div>

    <div class="view" data-tab="accounts">
      <button class="add-btn" id="addAccountBtn">+ เพิ่มบัญชี/บัตรใหม่</button>
      <div id="accountsList"></div>
    </div>

  </div>
</div>

<div class="sheet-overlay" id="sheetOverlay">
  <div class="sheet">
    <div class="sheet-title" id="sheetTitle">เพิ่มบัญชี</div>

    <div class="form-field">
      <div class="form-label">ชื่อบัญชี/บัตร</div>
      <input class="form-input" id="f_name" type="text" placeholder="เช่น บัตรเครดิต KTC">
    </div>
    <div class="form-field">
      <div class="form-label">Aliases (คั่นด้วย , ใช้ตอนพิมพ์ในแชท)</div>
      <input class="form-input" id="f_aliases" type="text" placeholder="เช่น ktc, เคทีซี">
    </div>
    <div class="form-row2">
      <div class="form-field">
        <div class="form-label">ธนาคาร/สถาบัน</div>
        <input class="form-input" id="f_institution" type="text">
      </div>
      <div class="form-field">
        <div class="form-label">เลข 4 ตัวท้าย</div>
        <input class="form-input" id="f_last4" type="text" maxlength="4" inputmode="numeric">
      </div>
    </div>
    <div class="form-field">
      <div class="form-label">ประเภทบัญชี</div>
      <select class="form-select" id="f_type">
        <option value="เงินสด">เงินสด</option>
        <option value="บัญชีธนาคาร">บัญชีธนาคาร</option>
        <option value="บัตรเครดิต">บัตรเครดิต</option>
      </select>
    </div>
    <div class="form-field">
      <div class="form-label">วงเงิน (กรอกเฉพาะบัตรเครดิต)</div>
      <input class="form-input" id="f_creditLimit" type="number" inputmode="numeric" placeholder="เช่น 22000">
    </div>
    <div class="form-row2">
      <div class="form-field">
        <div class="form-label">วันตัดรอบบิล</div>
        <input class="form-input" id="f_stmtDate" type="number" min="1" max="31" placeholder="เช่น 16">
      </div>
      <div class="form-field">
        <div class="form-label">วันครบกำหนดจ่าย</div>
        <input class="form-input" id="f_dueDate" type="number" min="1" max="31" placeholder="เช่น 5">
      </div>
    </div>
    <div class="toggle-row">
      <div class="form-label" style="margin:0;">ใช้งานอยู่ (Active)</div>
      <input type="checkbox" id="f_active" checked style="width:20px;height:20px;accent-color:var(--ink-green);">
    </div>

    <div class="status" id="formStatus"></div>
    <div class="form-actions">
      <button class="btn ghost" id="cancelBtn">ยกเลิก</button>
      <button class="btn primary" id="saveBtn">บันทึก</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
// ตั้งค่า 2 ค่านี้ให้ครบก่อนใช้งานจริง — _ID ตัวนี้ต้องเป็นคนละตัวกับหน้า index.html (สร้างใหม่)
const LIFF_ID = '2010765349-zPxwdlWo';
const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbyPDfZlGd36J0RkYWNgvoe4IKsTGTYoggu6GUiYQQlrNpTncbkE6ozvTq44TyaxwH-gLA/exec'; // URL /exec เดียวกับหน้า index.html

let state = { tab: 'summary', userId: null, accounts: [], editingId: null };

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

function jsonp(url){
  return new Promise((resolve, reject) => {
    const cbName = 'cb_' + Math.random().toString(36).slice(2);
    const script = document.createElement('script');
    const cleanup = () => { delete window[cbName]; script.remove(); };
    window[cbName] = (data) => { resolve(data); cleanup(); };
    script.onerror = () => { reject(new Error('โหลดข้อมูลไม่สำเร็จ')); cleanup(); };
    script.src = url + (url.indexOf('?') > -1 ? '&' : '?') + 'callback=' + cbName;
    document.body.appendChild(script);
    setTimeout(() => { reject(new Error('หมดเวลาเชื่อมต่อ')); cleanup(); }, 10000);
  });
}

async function init(){
  bindTabs();
  bindAccountForm();

  const watchdog = setTimeout(() => {
    document.getElementById('profileLine').textContent = 'เชื่อมต่อไม่สำเร็จ: liff.init() ค้างเกิน 8 วิ';
  }, 8000);

 if (LIFF_ID.indexOf('YOUR_') === 0) {
    clearTimeout(watchdog);
    document.getElementById('profileLine').textContent = 'ยังไม่ได้ตั้งค่า LIFF_ID ในไฟล์ (ยังเป็นค่า placeholder)';
    return;
  }
  if (typeof liff === 'undefined') {
    clearTimeout(watchdog);
    document.getElementById('profileLine').textContent = 'โหลด LIFF SDK ไม่สำเร็จ (เช็คอินเทอร์เน็ต/ปิด ad blocker/ลองเปิดนอกโหมด Private)';
    return;
  }

  try{
    await liff.init({ liffId: LIFF_ID });
    clearTimeout(watchdog);
    if(!liff.isLoggedIn()){ liff.login(); return; }
    const profile = await liff.getProfile();
    state.userId = profile.userId;
    document.getElementById('profileLine').textContent = profile.displayName;
    loadCardSummary();
    loadAccounts();
  }catch(err){
    clearTimeout(watchdog);
    document.getElementById('profileLine').textContent = 'เชื่อมต่อ LINE ไม่สำเร็จ: ' + (err && err.message ? err.message : JSON.stringify(err));
  }
}

function bindTabs(){
  document.getElementById('tabs').addEventListener('click', e => {
    const btn = e.target.closest('.tab'); if(!btn) return;
    state.tab = btn.dataset.tab;
    document.querySelectorAll('.tab').forEach(t => t.dataset.active = (t.dataset.tab === state.tab) ? 'true' : 'false');
    document.querySelectorAll('.view').forEach(v => v.dataset.active = (v.dataset.tab === state.tab) ? 'true' : 'false');
  });
}

/* ---------------- สรุปยอดบัตร ---------------- */

async function loadCardSummary(){
  try{
    const data = await jsonp(WEBAPP_URL + '?action=cardSummary&userId=' + encodeURIComponent(state.userId));
    if(!data.ok){ toast(data.message || 'โหลดสรุปยอดไม่สำเร็จ'); return; }
    renderCards(data.cards);
  }catch(err){ toast('โหลดสรุปยอดบัตรไม่สำเร็จ'); }
}

function utilColor(pct){
  if(pct >= 80) return 'var(--ink-red)';
  if(pct >= 50) return 'var(--gold)';
  return 'var(--ink-green)';
}

function renderCards(cards){
  const el = document.getElementById('cardsContainer');
  el.innerHTML = '';
  if(!cards.length){
    el.innerHTML = '<div class="empty-note">ยังไม่มีบัตรเครดิตที่ Active</div>';
    return;
  }
  cards.forEach(c => {
    const color = utilColor(c.utilizationPct);
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `
      <div class="card-head">
        <div>
          <div class="card-name">${c.name}</div>
          <div class="card-sub">${c.institution || ''}${c.last4 ? ' •••• ' + c.last4 : ''}</div>
        </div>
        <div style="text-align:right;">
          <div class="card-sub">วงเงิน ${c.creditLimit.toLocaleString()} บ.</div>
        </div>
      </div>
      <div class="util-bar-track"><div class="util-bar-fill" style="width:${Math.min(c.utilizationPct,100)}%; background:${color}; box-shadow:0 0 8px ${color};"></div></div>
      <div class="util-label">
        <span>ใช้ไป ${c.totalOutstanding.toLocaleString()} บ. (${c.utilizationPct}%)</span>
        <span>เหลือ ${c.availableCredit.toLocaleString()} บ.</span>
      </div>
      <div class="stat-grid">
        <div class="stat">
          <div class="stat-label">ยอดใช้รอบนี้</div>
          <div class="stat-value">${c.currentCycleSpend.toLocaleString()} บ.</div>
        </div>
        <div class="stat">
          <div class="stat-label">ยอดที่ต้องจ่ายรอบถัดไป</div>
          <div class="stat-value due">${c.amountDueSoon.toLocaleString()} บ.</div>
          <div class="due-date-tag">${c.nextDueDate ? 'ครบกำหนด ' + c.nextDueDate : ''}</div>
        </div>
      </div>
    `;
    el.appendChild(div);
  });
}

/* ---------------- จัดการบัญชี ---------------- */

async function loadAccounts(){
  try{
    const data = await jsonp(WEBAPP_URL + '?action=allAccounts&userId=' + encodeURIComponent(state.userId));
    if(!data.ok){ toast(data.message || 'โหลดรายชื่อบัญชีไม่สำเร็จ'); return; }
    state.accounts = data.accounts;
    renderAccountList();
  }catch(err){ toast('โหลดรายชื่อบัญชีไม่สำเร็จ'); }
}

function renderAccountList(){
  const el = document.getElementById('accountsList');
  el.innerHTML = '';
  state.accounts.forEach(a => {
    const inactive = String(a.Active).toUpperCase() === 'FALSE';
    const div = document.createElement('div');
    div.className = 'acc-list-item';
    div.dataset.inactive = inactive ? 'true' : 'false';
    div.innerHTML = `
      <div>
        <div class="acc-name">${a.AccountName}</div>
        <div class="acc-sub">${a.AccountType || ''}${a.CreditLimit ? ' • วงเงิน ' + Number(a.CreditLimit).toLocaleString() : ''}${inactive ? ' • ปิดใช้งาน' : ''}</div>
      </div>
      <div class="acc-edit">✎</div>
    `;
    div.addEventListener('click', () => openAccountForm(a));
    el.appendChild(div);
  });
}

document.getElementById('addAccountBtn').addEventListener('click', () => openAccountForm(null));

function openAccountForm(account){
  state.editingId = account ? account.AccountID : null;
  document.getElementById('sheetTitle').textContent = account ? 'แก้ไขบัญชี' : 'เพิ่มบัญชีใหม่';
  document.getElementById('f_name').value = account ? account.AccountName : '';
  document.getElementById('f_aliases').value = account ? account.Aliases : '';
  document.getElementById('f_institution').value = account ? account.Institution : '';
  document.getElementById('f_last4').value = account ? account.Last4 : '';
  document.getElementById('f_type').value = account ? (account.AccountType || 'เงินสด') : 'เงินสด';
  document.getElementById('f_creditLimit').value = account ? account.CreditLimit : '';
  document.getElementById('f_stmtDate').value = account ? account.StatementDate : '';
  document.getElementById('f_dueDate').value = account ? account.DueDate : '';
  document.getElementById('f_active').checked = account ? String(account.Active).toUpperCase() !== 'FALSE' : true;
  document.getElementById('formStatus').textContent = '';
  document.getElementById('sheetOverlay').dataset.open = 'true';
}

function closeAccountForm(){
  document.getElementById('sheetOverlay').dataset.open = 'false';
}

function bindAccountForm(){
  document.getElementById('cancelBtn').addEventListener('click', closeAccountForm);
  document.getElementById('sheetOverlay').addEventListener('click', (e) => {
    if(e.target.id === 'sheetOverlay') closeAccountForm();
  });
  document.getElementById('saveBtn').addEventListener('click', saveAccount);
}

async function saveAccount(){
  const name = document.getElementById('f_name').value.trim();
  const statusEl = document.getElementById('formStatus');
  if(!name){ statusEl.textContent = 'กรอกชื่อบัญชีก่อน'; statusEl.className = 'status err'; return; }

  const btn = document.getElementById('saveBtn');
  btn.disabled = true; statusEl.textContent = 'กำลังบันทึก…'; statusEl.className = 'status';

  const params = new URLSearchParams({
    action: 'saveAccount', userId: state.userId || '',
    accountId: state.editingId || '',
    accountName: name,
    aliases: document.getElementById('f_aliases').value.trim(),
    institution: document.getElementById('f_institution').value.trim(),
    last4: document.getElementById('f_last4').value.trim(),
    accountType: document.getElementById('f_type').value,
    creditLimit: document.getElementById('f_creditLimit').value,
    statementDate: document.getElementById('f_stmtDate').value,
    dueDate: document.getElementById('f_dueDate').value,
    active: document.getElementById('f_active').checked ? 'true' : 'false'
  });

  try{
    const data = await jsonp(WEBAPP_URL + '?' + params.toString());
    if(data.ok){
      toast(data.message);
      closeAccountForm();
      loadAccounts();
      loadCardSummary();
    } else {
      statusEl.textContent = data.message || 'บันทึกไม่สำเร็จ'; statusEl.className = 'status err';
    }
  }catch(err){
    statusEl.textContent = 'เชื่อมต่อไม่สำเร็จ ลองใหม่อีกครั้ง'; statusEl.className = 'status err';
  }
  btn.disabled = false;
}

init();
</script>
</body>
</html>

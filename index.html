<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>สมุดบัญชี</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cover:#050806;
    --cover-dark:#020302;
    --paper:#081109;
    --paper-line:#173322;
    --ink-red:#FF4D3D;
    --ink-green:#33FF66;
    --ink-blue:#2FE0A8;
    --ink-purple:#C9E63A;
    --gold:#8CFFB0;
    --panel:#0C1912;
    --panel-alt:#12241A;
    --text-muted:#5E8A6C;
    --text-dark:#CFEFD9;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--cover); min-height:100%;}
  body{
    font-family:'IBM Plex Sans Thai', sans-serif;
    color:var(--text-dark);
    background:linear-gradient(180deg, var(--cover) 0%, var(--cover-dark) 100%);
    display:flex; justify-content:center;
    position:relative;
  }
  @media (prefers-reduced-motion: no-preference){
    body::before{
      content:''; position:fixed; inset:0; pointer-events:none; z-index:50;
      background:linear-gradient(180deg, transparent, rgba(51,255,102,0.05), transparent);
      background-size:100% 5px; animation:scan 7s linear infinite; mix-blend-mode:screen;
    }
  }
  @keyframes scan{ 0%{transform:translateY(-100%);} 100%{transform:translateY(100%);} }
  .app{ width:100%; max-width:480px; min-height:100vh; display:flex; flex-direction:column; }

  /* ปกสมุดบัญชี */
  .cover{ padding:22px 20px 16px; position:relative; }
  .cover::after{
    content:''; position:absolute; left:20px; right:20px; bottom:0; height:1px;
    background:linear-gradient(90deg, transparent, var(--gold), transparent);
    box-shadow:0 0 8px rgba(51,255,102,.45);
  }
  .cover h1{
    font-family:'Chakra Petch', sans-serif; font-weight:700; color:var(--ink-green);
    font-size:22px; margin:0 0 2px; letter-spacing:.04em; text-transform:uppercase;
    text-shadow:0 0 10px rgba(51,255,102,.55), 0 0 2px rgba(51,255,102,.8);
  }
  .cover p{ color:var(--text-muted); font-size:12.5px; margin:0; font-family:'IBM Plex Mono', monospace; }

  /* แท็บประเภทธุรกรรม */
  .tabs{ display:flex; gap:6px; padding:14px 20px 0; }
  .tab{
    flex:1; text-align:center; padding:10px 4px; border-radius:6px 6px 0 0;
    font-weight:600; font-size:13px; color:var(--text-muted); background:var(--panel);
    border:1px solid var(--paper-line); border-bottom:none;
    font-family:'IBM Plex Sans Thai', sans-serif; cursor:pointer;
  }
  .tab[data-active="true"]{ background:var(--paper); color:var(--ink-green); text-shadow:0 0 6px rgba(51,255,102,.5); }
  .tab[data-type="จ่าย"][data-active="true"]{ color:var(--ink-red); text-shadow:0 0 6px rgba(255,77,61,.5); }
  .tab[data-type="รับ"][data-active="true"]{ color:var(--ink-green); }
  .tab[data-type="โอน"][data-active="true"]{ color:var(--ink-blue); text-shadow:0 0 6px rgba(47,224,168,.5); }
  .tab[data-type="ผ่อน"][data-active="true"]{ color:var(--ink-purple); text-shadow:0 0 6px rgba(201,230,58,.5); }

  /* หน้ากระดาษบัญชี */
  .ledger{ background:var(--paper); flex:1; padding:22px 20px 100px; border-top:1px solid var(--paper-line); }

  .amount-row{ text-align:center; padding:6px 0 18px; }
  .amount-label{ font-size:11px; letter-spacing:.12em; color:var(--text-muted); margin-bottom:6px; font-family:'IBM Plex Mono', monospace; text-transform:uppercase; }
  .amount-value{ font-family:'IBM Plex Mono', monospace; font-weight:700; font-size:44px; letter-spacing:.01em; min-height:52px; }
  .amount-value.red{ color:var(--ink-red); text-shadow:0 0 14px rgba(255,77,61,.45); }
  .amount-value.green{ color:var(--ink-green); text-shadow:0 0 14px rgba(51,255,102,.45); }
  .amount-value.blue{ color:var(--ink-blue); text-shadow:0 0 14px rgba(47,224,168,.45); }
  .amount-value.purple{ color:var(--ink-purple); text-shadow:0 0 14px rgba(201,230,58,.45); }

  .keypad{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:14px; }
  .key{
    background:var(--panel); border:1px solid var(--paper-line); border-radius:8px;
    font-family:'IBM Plex Mono', monospace; font-size:19px; font-weight:600; color:var(--text-dark);
    padding:13px 0; cursor:pointer;
  }
  .key:active{ background:var(--panel-alt); border-color:var(--ink-green); }
  .key.wide{ font-size:14px; color:var(--text-muted); }

  /* เส้นปรุฉีก */
  .perforation{ position:relative; height:1px; margin:18px -20px 18px; }
  .perforation::before{
    content:''; position:absolute; left:0; right:0; top:0; height:1px;
    background-image:linear-gradient(90deg, var(--paper-line) 60%, transparent 0);
    background-size:12px 1px; background-repeat:repeat-x;
  }
  .perforation .notch{ position:absolute; top:-7px; width:14px; height:14px; border-radius:50%; background:var(--cover); border:1px solid var(--paper-line); }
  .perforation .notch.left{ left:-7px; } .perforation .notch.right{ right:-7px; }

  .field{ margin-bottom:16px; }
  .field-label{ font-size:12px; color:var(--text-muted); margin-bottom:8px; font-weight:600; font-family:'IBM Plex Mono', monospace; text-transform:uppercase; letter-spacing:.06em; }
  .field-label-row{ display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .field-label-row .field-label{ margin-bottom:0; }
  .add-cat-btn{ background:transparent; border:1px solid var(--paper-line); color:var(--ink-green);
    font-family:'IBM Plex Mono', monospace; font-size:11.5px; padding:4px 10px; border-radius:4px; cursor:pointer; }

  .chips{ display:flex; flex-wrap:wrap; gap:8px; }
  .chips:not(:empty){ margin-bottom:8px; }
  .chip{
    padding:8px 14px; border-radius:4px; border:1px solid var(--paper-line); background:var(--panel);
    font-size:13.5px; font-weight:500; color:var(--text-dark); cursor:pointer; font-family:inherit;
  }
  .chip[data-active="true"]{ background:rgba(51,255,102,.12); color:var(--ink-green); border-color:var(--ink-green); text-shadow:0 0 6px rgba(51,255,102,.4); }

  .dropdown{
    width:100%; padding:11px 34px 11px 12px; border-radius:6px; border:1px solid var(--paper-line);
    font-family:'IBM Plex Sans Thai', sans-serif; font-size:14px; background:var(--panel); color:var(--text-dark);
    appearance:none; -webkit-appearance:none;
    background-image:linear-gradient(45deg, transparent 50%, var(--ink-green) 50%), linear-gradient(135deg, var(--ink-green) 50%, transparent 50%);
    background-position: calc(100% - 18px) center, calc(100% - 13px) center;
    background-size:5px 5px, 5px 5px; background-repeat:no-repeat;
  }
  .dropdown:focus{ outline:none; border-color:var(--ink-green); box-shadow:0 0 0 1px var(--ink-green); }

  .inline-add{ display:flex; gap:6px; margin-top:8px; }
  .inline-add .note-input{ flex:1; }
  .mini-btn{ padding:0 12px; border-radius:6px; border:1px solid var(--ink-green); background:var(--ink-green);
    color:var(--cover-dark); font-family:'IBM Plex Mono', monospace; font-size:12.5px; font-weight:700; cursor:pointer; }
  .mini-btn.ghost{ background:transparent; color:var(--text-muted); border-color:var(--paper-line); }

  .note-input{
    width:100%; padding:11px 12px; border-radius:6px; border:1px solid var(--paper-line);
    font-family:inherit; font-size:14px; background:var(--panel); color:var(--text-dark);
  }
  .note-input:focus{ outline:none; border-color:var(--ink-green); box-shadow:0 0 0 1px var(--ink-green); }

  .segmented{ display:flex; gap:8px; }
  .seg-btn{ flex:1; padding:10px 0; border-radius:6px; border:1px solid var(--paper-line); background:var(--panel);
    color:var(--text-dark); font-family:'IBM Plex Mono', monospace; font-size:13.5px; cursor:pointer; }
  .seg-btn[data-active="true"]{ background:rgba(51,255,102,.12); color:var(--ink-green); border-color:var(--ink-green); text-shadow:0 0 6px rgba(51,255,102,.4); }

  /* ปุ่มบันทึกแบบตราปั๊ม */
  .submit-bar{
    position:fixed; left:0; right:0; bottom:0; display:flex; justify-content:center;
    padding:14px 20px calc(14px + env(safe-area-inset-bottom)); background:linear-gradient(180deg, rgba(8,17,9,0), var(--paper) 30%);
  }
  .submit-bar-inner{ width:100%; max-width:440px; }
  .stamp-btn{
    width:100%; border:1px solid; border-radius:8px; padding:15px 0; font-family:'Chakra Petch', sans-serif;
    font-size:16px; font-weight:600; cursor:pointer; letter-spacing:.04em; background:transparent; text-transform:uppercase;
  }
  .stamp-btn.red{ color:var(--ink-red); border-color:var(--ink-red); box-shadow:0 0 14px rgba(255,77,61,.25) inset; }
  .stamp-btn.green{ color:var(--ink-green); border-color:var(--ink-green); box-shadow:0 0 14px rgba(51,255,102,.25) inset; }
  .stamp-btn.blue{ color:var(--ink-blue); border-color:var(--ink-blue); box-shadow:0 0 14px rgba(47,224,168,.25) inset; }
  .stamp-btn.purple{ color:var(--ink-purple); border-color:var(--ink-purple); box-shadow:0 0 14px rgba(201,230,58,.25) inset; }
  .stamp-btn:active{ transform:scale(0.98); }
  .stamp-btn:disabled{ opacity:.5; }

  .status{ text-align:center; font-size:13px; color:var(--text-muted); min-height:18px; margin-top:2px; font-family:'IBM Plex Mono', monospace; }
  .status.ok{ color:var(--ink-green); font-weight:600; }
  .status.err{ color:var(--ink-red); font-weight:600; }

  .toast{
    position:fixed; top:16px; left:50%; transform:translateX(-50%);
    background:var(--panel); color:var(--ink-green); padding:10px 18px; border-radius:6px;
    border:1px solid var(--ink-green);
    font-size:13.5px; opacity:0; transition:opacity .25s; pointer-events:none; max-width:90%; text-align:center;
    font-family:'IBM Plex Mono', monospace; z-index:60;
  }
  .toast.show{ opacity:1; }
</style>
</head>
<body>
<div class="app">

  <div class="cover">
    <h1>สมุดบัญชี</h1>
    <p id="profileLine">กำลังเชื่อมต่อ…</p>
  </div>

  <div class="tabs" id="tabs">
    <button class="tab" data-type="จ่าย" data-active="true">จ่าย</button>
    <button class="tab" data-type="รับ">รับ</button>
    <button class="tab" data-type="โอน">โอน/จ่ายบัตร</button>
    <button class="tab" data-type="ผ่อน">ผ่อน</button>
  </div>

  <div class="ledger">

    <div class="amount-row">
      <div class="amount-label">จำนวนเงิน (บาท)</div>
      <div class="amount-value red" id="amountDisplay">0</div>
    </div>

    <div class="keypad" id="keypad">
      <button class="key" data-k="1">1</button><button class="key" data-k="2">2</button><button class="key" data-k="3">3</button>
      <button class="key" data-k="4">4</button><button class="key" data-k="5">5</button><button class="key" data-k="6">6</button>
      <button class="key" data-k="7">7</button><button class="key" data-k="8">8</button><button class="key" data-k="9">9</button>
      <button class="key wide" data-k=".">.</button><button class="key" data-k="0">0</button><button class="key wide" data-k="back">⌫</button>
    </div>

    <div class="perforation"><span class="notch left"></span><span class="notch right"></span></div>

    <!-- จ่าย: แยกดรอปดาวน์บัญชี / บัตร -->
    <div id="payFields" class="field-group" style="display:none;">
      <div class="field">
        <div class="field-label">จ่ายจากบัญชี</div>
        <div class="chips" id="payAccountQuick"></div>
        <select class="dropdown" id="payAccountSelect"><option value="">เลือกบัญชี…</option></select>
      </div>
      <div class="field">
        <div class="field-label">จ่ายจากบัตร</div>
        <div class="chips" id="payCardQuick"></div>
        <select class="dropdown" id="payCardSelect"><option value="">เลือกบัตร…</option></select>
      </div>
    </div>

    <!-- รับ: บัญชีธนาคาร/เงินสดเท่านั้น -->
    <div id="receiveFields" class="field-group" style="display:none;">
      <div class="field">
        <div class="field-label">เข้าบัญชี</div>
        <div class="chips" id="receiveAccountQuick"></div>
        <select class="dropdown" id="receiveAccountSelect"><option value="">เลือกบัญชี…</option></select>
      </div>
    </div>

    <!-- โอน/จ่ายบัตร: ต้นทาง-ปลายทาง -->
    <div id="transferFields" class="field-group" style="display:none;">
      <div class="field">
        <div class="field-label">ต้นทาง</div>
        <div class="chips" id="transferSourceQuick"></div>
        <select class="dropdown" id="transferSourceSelect"><option value="">เลือกต้นทาง…</option></select>
      </div>
      <div class="field">
        <div class="field-label">ปลายทาง</div>
        <div class="chips" id="transferDestQuick"></div>
        <select class="dropdown" id="transferDestSelect"><option value="">เลือกปลายทาง…</option></select>
      </div>
    </div>

    <!-- ผ่อน: บัตรเท่านั้น -->
    <div id="installmentFields" class="field-group" style="display:none;">
      <div class="field">
        <div class="field-label">ตัดจากบัตร</div>
        <div class="chips" id="installmentCardQuick"></div>
        <select class="dropdown" id="installmentCardSelect"><option value="">เลือกบัตร…</option></select>
      </div>
    </div>

    <!-- หมวดหมู่: ใช้ร่วมกันทุกแท็บยกเว้นโอน -->
    <div class="field" id="categoryField">
      <div class="field-label-row">
        <div class="field-label">หมวดหมู่</div>
        <button type="button" class="add-cat-btn" id="addCategoryBtn">+ เพิ่มหมวด</button>
      </div>
      <div class="chips" id="categoryQuick"></div>
      <select class="dropdown" id="categorySelect"><option value="">เลือกหมวดหมู่…</option></select>
      <div class="inline-add" id="categoryAddRow" style="display:none;">
        <input class="note-input" id="newCategoryInput" placeholder="ชื่อหมวดใหม่">
        <button type="button" class="mini-btn" id="confirmAddCategoryBtn">บันทึก</button>
        <button type="button" class="mini-btn ghost" id="cancelAddCategoryBtn">ยกเลิก</button>
      </div>
    </div>

    <div class="field" id="totalTermsField" style="display:none;">
      <div class="field-label">จำนวนงวด</div>
      <input class="note-input" id="totalTermsInput" type="number" inputmode="numeric" min="1" step="1" placeholder="เช่น 10">
    </div>

    <div class="field" id="interestField" style="display:none;">
      <div class="field-label">ดอกเบี้ย</div>
      <div class="segmented" id="interestToggle">
        <button type="button" class="seg-btn" data-val="0%" data-active="true">0%</button>
        <button type="button" class="seg-btn" data-val="อื่นๆ">อื่นๆ</button>
      </div>
      <input class="note-input" id="interestRateInput" type="number" inputmode="decimal" step="0.01" min="0"
        placeholder="% ต่อเดือน เช่น 1.5" style="display:none; margin-top:8px;">
    </div>

    <div class="field">
      <div class="field-label">โน้ต (ไม่บังคับ)</div>
      <input class="note-input" id="noteInput" type="text" placeholder="เช่น ข้าวเที่ยงกับเพื่อน">
    </div>

    <div class="status" id="statusLine"></div>
  </div>

  <div class="submit-bar">
    <div class="submit-bar-inner">
      <button class="stamp-btn red" id="submitBtn">บันทึกรายการ</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
// ตั้งค่า 2 ค่านี้ให้ครบก่อนใช้งานจริง
const LIFF_ID = '2010765349-ulfFDLpR';        // จาก LINE Developers Console แท็บ LIFF
const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbyPDfZlGd36J0RkYWNgvoe4IKsTGTYoggu6GUiYQQlrNpTncbkE6ozvTq44TyaxwH-gLA/exec'; // URL /exec เดียวกับที่ใช้เป็น webhook

const TYPE_COLOR = { 'จ่าย':'red', 'รับ':'green', 'โอน':'blue', 'ผ่อน':'purple' };

let state = {
  type:'จ่าย', amount:'0',
  account:null, source:null, dest:null, category:null, note:'',
  userId:null, totalTerms:'', interestType:'0%', interestRate:''
};

// meta.accounts: [{id,name,type}], meta.categories: {จ่าย:[...],รับ:[...],ผ่อน:[...]}, meta.frequent: {...}
let meta = { accounts: [], categories: {}, frequent: {} };

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

async function init(){
  bindEvents();
  render();

  const watchdog = setTimeout(() => {
    document.getElementById('profileLine').textContent = 'เชื่อมต่อไม่สำเร็จ: liff.init() ค้างเกิน 8 วิ (เช็คว่าใส่ LIFF_ID ถูกต้อง และ deploy เวอร์ชันใหม่แล้ว)';
  }, 8000);

  if (typeof liff === 'undefined') {
    clearTimeout(watchdog);
    document.getElementById('profileLine').textContent = 'โหลด LIFF SDK ไม่สำเร็จ (เช็คอินเทอร์เน็ต/ลองเปิดใหม่)';
    loadFormMeta();
    return;
  }
  if (LIFF_ID.indexOf('YOUR_') === 0) {
    clearTimeout(watchdog);
    document.getElementById('profileLine').textContent = 'ยังไม่ได้ใส่ LIFF_ID จริงในไฟล์ Liff.html';
    loadFormMeta();
    return;
  }

  try{
    await liff.init({ liffId: LIFF_ID });
    clearTimeout(watchdog);
    if(!liff.isLoggedIn()){ liff.login(); return; }
    const profile = await liff.getProfile();
    state.userId = profile.userId;
    document.getElementById('profileLine').textContent = 'บันทึกในนาม ' + profile.displayName;
  }catch(err){
    clearTimeout(watchdog);
    document.getElementById('profileLine').textContent = 'เชื่อมต่อ LINE ไม่สำเร็จ: ' + (err && err.message ? err.message : JSON.stringify(err));
  }
  loadFormMeta();
}

function jsonp(url){
  return new Promise((resolve, reject) => {
    const cbName = 'cb_' + Math.random().toString(36).slice(2);
    const script = document.createElement('script');
    const cleanup = () => { delete window[cbName]; script.remove(); };
    window[cbName] = (data) => { resolve(data); cleanup(); };
    script.onerror = () => { reject(new Error('โหลดข้อมูลไม่สำเร็จ')); cleanup(); };
    script.src = url + (url.indexOf('?') > -1 ? '&' : '?') + 'callback=' + cbName;
    document.body.appendChild(script);
    setTimeout(() => { reject(new Error('หมดเวลาเชื่อมต่อ')); cleanup(); }, 10000);
  });
}

async function loadFormMeta(){
  try{
    meta = await jsonp(WEBAPP_URL + '?action=formMeta');
    if(!meta.categories) meta.categories = {};
    if(!meta.accounts) meta.accounts = [];
    if(!meta.frequent) meta.frequent = {};
  }catch(err){
    toast('โหลดข้อมูลฟอร์มไม่สำเร็จ');
    meta = { accounts: [], categories: {}, frequent: {} };
  }
  renderPickers();
}

/* ---------- ตัวช่วย render ช่อง "ใช้บ่อย" + ดรอปดาวน์ ---------- */

function makeChip(label, onClick, active){
  const b = document.createElement('button');
  b.className = 'chip'; b.textContent = label; b.type = 'button';
  b.dataset.active = active ? 'true' : 'false';
  b.onclick = onClick;
  return b;
}

// fullList / quickList: [{id,name}]
function populatePicker(quickEl, selectEl, fullList, quickList, selectedValue, onPick){
  quickEl.innerHTML = '';
  quickList.forEach(item => {
    quickEl.appendChild(makeChip(item.name, () => onPick(item.id), selectedValue === item.id));
  });
  const options = ['<option value="">เลือก…</option>'].concat(
    fullList.map(item => `<option value="${item.id}"${selectedValue === item.id ? ' selected' : ''}>${item.name}</option>`)
  );
  selectEl.innerHTML = options.join('');
}

function renderPickers(){
  const bankAccounts = meta.accounts.filter(a => a.type !== 'บัตรเครดิต');
  const cardAccounts = meta.accounts.filter(a => a.type === 'บัตรเครดิต');
  const allAccounts = meta.accounts;
  const freq = meta.frequent;

  populatePicker(
    document.getElementById('payAccountQuick'), document.getElementById('payAccountSelect'),
    bankAccounts, freq.payAccount || [], state.type === 'จ่าย' ? state.account : null,
    id => { state.account = id; renderPickers(); }
  );
  populatePicker(
    document.getElementById('payCardQuick'), document.getElementById('payCardSelect'),
    cardAccounts, freq.payCard || [], state.type === 'จ่าย' ? state.account : null,
    id => { state.account = id; renderPickers(); }
  );
  populatePicker(
    document.getElementById('receiveAccountQuick'), document.getElementById('receiveAccountSelect'),
    bankAccounts, freq.receiveAccount || [], state.type === 'รับ' ? state.account : null,
    id => { state.account = id; renderPickers(); }
  );
  populatePicker(
    document.getElementById('transferSourceQuick'), document.getElementById('transferSourceSelect'),
    allAccounts, freq.transferSource || [], state.source,
    id => { state.source = id; renderPickers(); }
  );
  populatePicker(
    document.getElementById('transferDestQuick'), document.getElementById('transferDestSelect'),
    allAccounts, freq.transferDest || [], state.dest,
    id => { state.dest = id; renderPickers(); }
  );
  populatePicker(
    document.getElementById('installmentCardQuick'), document.getElementById('installmentCardSelect'),
    cardAccounts, freq.installmentCard || [], state.type === 'ผ่อน' ? state.account : null,
    id => { state.account = id; renderPickers(); }
  );

  const catFreqKey = { 'จ่าย':'payCategory', 'รับ':'receiveCategory', 'ผ่อน':'installmentCategory' }[state.type];
  const catList = (meta.categories[state.type] || []).map(name => ({ id: name, name: name }));
  const catQuick = (catFreqKey && freq[catFreqKey] ? freq[catFreqKey] : []).map(name => ({ id: name, name: name }));
  populatePicker(
    document.getElementById('categoryQuick'), document.getElementById('categorySelect'),
    catList, catQuick, state.category,
    id => { state.category = id; renderPickers(); }
  );
}

/* ---------- เพิ่มหมวดหมู่เอง ---------- */

async function addNewCategory(){
  const input = document.getElementById('newCategoryInput');
  const name = input.value.trim();
  if(!name) return;
  const btn = document.getElementById('confirmAddCategoryBtn');
  btn.disabled = true;
  try{
    const params = new URLSearchParams({ action:'addCategory', userId: state.userId || '', type: state.type, name: name });
    const data = await jsonp(WEBAPP_URL + '?' + params.toString());
    if(data.ok){
      if(!meta.categories[state.type]) meta.categories[state.type] = [];
      if(meta.categories[state.type].indexOf(data.name) === -1) meta.categories[state.type].push(data.name);
      state.category = data.name;
      document.getElementById('categoryAddRow').style.display = 'none';
      input.value = '';
      renderPickers();
      toast(data.message);
    } else {
      toast(data.message || 'เพิ่มหมวดไม่สำเร็จ');
    }
  }catch(err){ toast('เชื่อมต่อไม่สำเร็จ ลองใหม่อีกครั้ง'); }
  btn.disabled = false;
}

/* ---------- เหตุการณ์ทั่วไป ---------- */

function bindEvents(){
  document.getElementById('tabs').addEventListener('click', e => {
    const btn = e.target.closest('.tab'); if(!btn) return;
    state.type = btn.dataset.type;
    state.category = null; state.account = null; state.source = null; state.dest = null;
    state.interestType = '0%'; state.interestRate = '';
    document.getElementById('categoryAddRow').style.display = 'none';
    render();
  });

  document.getElementById('keypad').addEventListener('click', e => {
    const btn = e.target.closest('.key'); if(!btn) return;
    const k = btn.dataset.k;
    if(k === 'back'){ state.amount = state.amount.length > 1 ? state.amount.slice(0,-1) : '0'; }
    else if(k === '.'){ if(!state.amount.includes('.')) state.amount += '.'; }
    else { state.amount = (state.amount === '0') ? k : state.amount + k; }
    document.getElementById('amountDisplay').textContent = state.amount;
  });

  document.getElementById('payAccountSelect').addEventListener('change', e => { state.account = e.target.value || null; renderPickers(); });
  document.getElementById('payCardSelect').addEventListener('change', e => { state.account = e.target.value || null; renderPickers(); });
  document.getElementById('receiveAccountSelect').addEventListener('change', e => { state.account = e.target.value || null; renderPickers(); });
  document.getElementById('transferSourceSelect').addEventListener('change', e => { state.source = e.target.value || null; renderPickers(); });
  document.getElementById('transferDestSelect').addEventListener('change', e => { state.dest = e.target.value || null; renderPickers(); });
  document.getElementById('installmentCardSelect').addEventListener('change', e => { state.account = e.target.value || null; renderPickers(); });
  document.getElementById('categorySelect').addEventListener('change', e => { state.category = e.target.value || null; renderPickers(); });

  document.getElementById('addCategoryBtn').addEventListener('click', () => {
    const row = document.getElementById('categoryAddRow');
    row.style.display = (row.style.display === 'none' || !row.style.display) ? 'flex' : 'none';
    if(row.style.display === 'flex') document.getElementById('newCategoryInput').focus();
  });
  document.getElementById('cancelAddCategoryBtn').addEventListener('click', () => {
    document.getElementById('categoryAddRow').style.display = 'none';
    document.getElementById('newCategoryInput').value = '';
  });
  document.getElementById('confirmAddCategoryBtn').addEventListener('click', addNewCategory);

  document.getElementById('interestToggle').addEventListener('click', e => {
    const btn = e.target.closest('.seg-btn'); if(!btn) return;
    state.interestType = btn.dataset.val;
    if(state.interestType === '0%') state.interestRate = '';
    renderInterestUI();
  });
  document.getElementById('interestRateInput').addEventListener('input', e => { state.interestRate = e.target.value; });

  document.getElementById('submitBtn').addEventListener('click', submit);
}

function renderInterestUI(){
  document.querySelectorAll('#interestToggle .seg-btn').forEach(b => {
    b.dataset.active = (b.dataset.val === state.interestType) ? 'true' : 'false';
  });
  document.getElementById('interestRateInput').style.display = state.interestType === 'อื่นๆ' ? 'block' : 'none';
}

function render(){
  document.querySelectorAll('.tab').forEach(t => t.dataset.active = (t.dataset.type === state.type) ? 'true' : 'false');
  const color = TYPE_COLOR[state.type];
  document.getElementById('amountDisplay').className = 'amount-value ' + color;
  document.getElementById('submitBtn').className = 'stamp-btn ' + color;

  document.getElementById('payFields').style.display = state.type === 'จ่าย' ? 'block' : 'none';
  document.getElementById('receiveFields').style.display = state.type === 'รับ' ? 'block' : 'none';
  document.getElementById('transferFields').style.display = state.type === 'โอน' ? 'block' : 'none';
  document.getElementById('installmentFields').style.display = state.type === 'ผ่อน' ? 'block' : 'none';
  document.getElementById('categoryField').style.display = state.type === 'โอน' ? 'none' : 'block';
  document.getElementById('totalTermsField').style.display = state.type === 'ผ่อน' ? 'block' : 'none';
  document.getElementById('interestField').style.display = state.type === 'ผ่อน' ? 'block' : 'none';

  renderPickers();
  renderInterestUI();
}

async function submit(){
  const amt = parseFloat(state.amount);
  if(!amt || amt <= 0){ setStatus('กรอกจำนวนเงินก่อน', 'err'); return; }

  let totalTerms = '';
  if(state.type === 'โอน'){
    if(!state.source || !state.dest){ setStatus('เลือกต้นทางและปลายทางให้ครบ', 'err'); return; }
  } else if(state.type === 'ผ่อน'){
    if(!state.account){ setStatus('เลือกบัตรก่อน', 'err'); return; }
    totalTerms = document.getElementById('totalTermsInput').value;
    if(!totalTerms || Number(totalTerms) <= 0 || !Number.isInteger(Number(totalTerms))){
      setStatus('กรอกจำนวนงวดให้ถูกต้อง', 'err'); return;
    }
    if(state.interestType === 'อื่นๆ' && (!state.interestRate || Number(state.interestRate) < 0)){
      setStatus('กรอก % ดอกเบี้ยต่อเดือนให้ถูกต้อง', 'err'); return;
    }
  } else {
    if(!state.account){ setStatus('เลือกบัญชี/บัตรก่อน', 'err'); return; }
  }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true; setStatus('กำลังบันทึก…', '');

  const params = new URLSearchParams({
    action: 'save', userId: state.userId || '', type: state.type, amount: amt,
    accountId: state.account || '', sourceId: state.source || '', destId: state.dest || '',
    category: state.category || '', note: document.getElementById('noteInput').value || '',
    totalTerms: totalTerms,
    interestType: state.type === 'ผ่อน' ? state.interestType : '',
    interestRate: (state.type === 'ผ่อน' && state.interestType === 'อื่นๆ') ? state.interestRate : ''
  });

  try{
    const data = await jsonp(WEBAPP_URL + '?' + params.toString());
    if(data.ok){
      setStatus('บันทึกแล้ว ✅ ' + amt.toLocaleString() + ' บาท', 'ok');
      state.amount = '0'; state.category = null; document.getElementById('noteInput').value = '';
      document.getElementById('totalTermsInput').value = '';
      state.interestType = '0%'; state.interestRate = '';
      document.getElementById('amountDisplay').textContent = '0';
      render();
      setTimeout(()=>{ if(liff.isInClient()) liff.closeWindow(); }, 900);
    } else {
      setStatus(data.message || 'บันทึกไม่สำเร็จ', 'err');
    }
  }catch(err){
    setStatus('เชื่อมต่อไม่สำเร็จ ลองใหม่อีกครั้ง', 'err');
  }
  btn.disabled = false;
}

function setStatus(msg, cls){
  const el = document.getElementById('statusLine');
  el.textContent = msg; el.className = 'status ' + (cls || '');
}

init();
</script>
